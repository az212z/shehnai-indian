<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:"Tajawal",sans-serif; min-height:100dvh; display:grid; place-items:center;
    text-align:center; padding:24px; color:#FBF4E6;
    background:radial-gradient(900px 600px at 70% 20%, rgba(113,24,42,.6), transparent 60%),

  }
  .wrap { max-width:520px; }
  .mark { width:84px; height:84px; border-radius:20px; box-shadow:0 12px 40px rgba(0,0,0,.3); margin-inline:auto; margin-bottom:24px; }
  h1 { font-family:"El Messiri",sans-serif; font-size:clamp(3.4rem,12vw,5.5rem); color:#F2C25C; line-height:1; }
  h2 { font-family:"El Messiri",sans-serif; font-size:1.6rem; margin:8px 0 12px; }
  p { color:#F4E7C9; margin-bottom:28px; font-size:1.05rem; }
  .btn { display:inline-flex; align-items:center; gap:10px; font-family:"El Messiri",sans-serif; font-weight:600;
    background:linear-gradient(135deg,#F2C25C,#D98A21); color:#3D0C16; padding:14px 28px; border-radius:999px;
    text-decoration:none; box-shadow:0 8px 24px rgba(0,0,0,.25); transition:transform .16s ease; }
  .btn:active { transform:scale(.97); }
  .btn svg { width:18px; height:18px; stroke:#3D0C16; stroke-width:1.8; fill:none; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="mark" src="assets/img/sh-5.jpg" alt="شعار مطعم شهناي" width="84" height="84" />
    <h1>404</h1>
    <h2>هذه الصفحة غير موجودة</h2>
    <p>يبدو أن الرابط الذي طلبته لم يعد متاحًا — لكن مائدتنا لا تزال بانتظارك.</p>
    <a class="btn" href="/batch9-restaurants/shehnai-indian/">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      العودة للصفحة الرئيسية
    </a>
  </div>
